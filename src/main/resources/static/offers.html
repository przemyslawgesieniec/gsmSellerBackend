<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Zarządzanie Ofertami</title>
    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
    <!-- Materialize CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Nasze style -->
    <link href="css/style.css" rel="stylesheet">
    <style>
        .offer-photos-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .photo-container {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }
        .photo-container .remove-photo {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            padding: 2px;
            font-size: 16px;
        }
        .ts-control {
            border: none !important;
            border-bottom: 1px solid #9e9e9e !important;
            border-radius: 0 !important;
            padding: 0 !important;
            min-height: 45px !important;
        }
        .ts-wrapper.focus .ts-control {
            box-shadow: none !important;
            border-bottom: 2px solid #26a69a !important;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div id="navbar"></div>
<script src="js/loadNavbar.js"></script>

<div class="container wide-layout">
    <div class="row">
        <div class="col s12">
            <h4 class="blue-text text-darken-2">Zarządzanie Ofertami</h4>
        </div>
    </div>

    <!-- Sekcja: Nowa Oferta / Edycja -->
    <div class="row">
        <div class="col s12">
            <div class="card">
                <div class="card-content">
                    <span class="card-title" id="formTitle">Stwórz nową ofertę</span>
                    <form id="offerForm">
                        <input type="hidden" id="editTechnicalId">
                        <div class="row">
                            <!-- Wybór telefonu -->
                            <div class="input-field col s12" id="phoneSelectWrapper">
                                <select id="phoneSelect" placeholder="Wyszukaj telefon po modelu, nazwie lub IMEI..."></select>
                                <label class="active">Wybierz telefon z magazynu</label>
                            </div>
                            <div class="col s12 mb-2 hide" id="selectedPhoneInfo">
                                <div class="chip" id="phoneChip">
                                    <span id="phoneDetails"></span>
                                    <i class="close material-icons" id="clearPhone">close</i>
                                </div>
                            </div>

                            <!-- Pola oferty -->
                            <div class="input-field col s12 m3">
                                <input id="brand" type="text" placeholder="np. Apple, Samsung">
                                <label for="brand" class="active">Marka</label>
                            </div>
                            <div class="input-field col s12 m3">
                                <input id="screenSize" type="text" placeholder="np. 6.1 cala">
                                <label for="screenSize" class="active">Rozmiar ekranu</label>
                            </div>
                            <div class="input-field col s12 m3">
                                <input id="screenResolution" type="text" placeholder="np. 3120 x 1440 px">
                                <label for="screenResolution" class="active">Rozdzielczość ekranu</label>
                            </div>
                            <div class="input-field col s12 m3">
                                <input id="screenType" type="text" placeholder="np. OLED, AMOLED">
                                <label for="screenType" class="active">Typ ekranu</label>
                            </div>
                            <div class="input-field col s12 m3">
                                <input id="memory" type="text" placeholder="np. 256 GB">
                                <label for="memory" class="active">Pamięć</label>
                            </div>
                            <div class="input-field col s12 m3">
                                <input id="ram" type="text" placeholder="np. 12 GB">
                                <label for="ram" class="active">RAM</label>
                            </div>
                            <div class="input-field col s12 m3">
                                <input id="simCardType" type="text" placeholder="np. Nano-SIM">
                                <label for="simCardType" class="active">Typ karty SIM</label>
                            </div>
                            <div class="input-field col s12 m3">
                                <input id="frontCamerasMpx" type="text" placeholder="np. 12, 10 (oddzielone przecinkiem)">
                                <label for="frontCamerasMpx" class="active">Aparaty przód (Mpx)</label>
                            </div>
                            <div class="input-field col s12 m3">
                                <input id="backCamerasMpx" type="text" placeholder="np. 200, 50, 50, 10 (oddzielone przecinkiem)">
                                <label for="backCamerasMpx" class="active">Aparaty tył (Mpx)</label>
                            </div>
                            <div class="input-field col s12 m3">
                                <input id="batteryCapacity" type="text" placeholder="np. 4500 mAh">
                                <label for="batteryCapacity" class="active">Pojemność baterii</label>
                            </div>
                            <div class="input-field col s12 m3">
                                <input id="operatingSystem" type="text" placeholder="np. Android 16">
                                <label for="operatingSystem" class="active">System operacyjny</label>
                            </div>

                            <!-- Komunikacja -->
                            <div class="input-field col s12 m4">
                                <input id="wifi" type="text" placeholder="np. Wi-Fi 7">
                                <label for="wifi" class="active">Wi-Fi</label>
                            </div>
                            <div class="input-field col s12 m4">
                                <input id="portType" type="text" placeholder="np. USB Type-C">
                                <label for="portType" class="active">Typ złącza</label>
                            </div>
                            <div class="input-field col s12 m4">
                                <input id="bluetoothVersion" type="text" placeholder="np. 6.0">
                                <label for="bluetoothVersion" class="active">Bluetooth</label>
                            </div>

                            <!-- Zdjęcia -->
                            <div class="col s12">
                                <p class="grey-text">Dodaj zdjęcia (maksymalnie 5)</p>
                                <div class="file-field input-field">
                                    <div class="btn blue">
                                        <span>Wybierz pliki</span>
                                        <input type="file" id="photoFiles" multiple accept="image/*">
                                    </div>
                                    <div class="file-path-wrapper">
                                        <input class="file-path validate" type="text" placeholder="Prześlij jedno lub więcej zdjęć">
                                    </div>
                                </div>
                                <div id="photosPreview" class="offer-photos-preview"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col s12 right-align">
                                <button type="button" id="cancelBtn" class="btn-flat waves-effect hide">Anuluj edycję</button>
                                <button type="submit" class="btn waves-effect waves-light blue darken-2">
                                    Zapisz ofertę
                                    <i class="material-icons right">send</i>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Sekcja: Aktualne Oferty -->
    <div class="row">
        <div class="col s12">
            <h5 class="blue-text text-darken-2">Aktualnie wystawione oferty</h5>
            <div id="offers-list" class="row">
                <!-- Tu trafią karty ofert -->
                <div class="col s12 center-align" id="offersLoader">
                    <div class="preloader-wrapper small active">
                        <div class="spinner-layer spinner-blue-only">
                            <div class="circle-clipper left"><div class="circle"></div></div>
                            <div class="gap-patch"><div class="circle"></div></div>
                            <div class="circle-clipper right"><div class="circle"></div></div>
                        </div>
                    </div>
                </div>
            </div>
            <ul id="offersPagination" class="pagination center-align"></ul>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
<script src="js/offers.js"></script>
</body>
</html>
